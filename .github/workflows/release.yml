name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CageClaw ${{ github.ref_name }}"
          releaseBody: |
            ## CageClaw ${{ github.ref_name }}

            **Alpha release — not yet security audited.**

            ### Requirements
            - Windows 10/11 (x64)
            - Docker Desktop running

            ### Install
            Download the `.msi` or `-setup.exe` below and run it.
          releaseDraft: false
          prerelease: true
